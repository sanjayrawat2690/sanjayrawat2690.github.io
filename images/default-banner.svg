<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
    <!-- Background gradient -->
    <defs>
        <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff9933" />
            <stop offset="100%" stop-color="#ff5722" />
        </linearGradient>
        
        <!-- Om symbol path -->
        <path id="om-path" d="M50,15 C60,35 80,35 90,15 C90,50 60,75 50,85 C40,75 10,50 10,15 C20,35 40,35 50,15" fill="#ff973340" />
    </defs>
    
    <!-- Main background -->
    <rect width="1200" height="500" fill="url(#bg-gradient)" />
    
    <!-- Pattern of Om symbols -->
    <g opacity="0.1">
        <use href="#om-path" x="100" y="50" transform="scale(2)" />
        <use href="#om-path" x="300" y="100" transform="scale(2.5)" />
        <use href="#om-path" x="600" y="50" transform="scale(2)" />
        <use href="#om-path" x="900" y="100" transform="scale(2.5)" />
        <use href="#om-path" x="200" y="250" transform="scale(3)" />
        <use href="#om-path" x="500" y="300" transform="scale(2)" />
        <use href="#om-path" x="800" y="250" transform="scale(3)" />
    </g>
    
    <!-- Main text -->
    <text x="600" y="250" font-size="40" text-anchor="middle" fill="#fff" font-family="Arial">आरती संग्रह</text>
    <text x="600" y="300" font-size="35" text-anchor="middle" fill="#fff" font-family="Arial">Aarti Sangrah</text>
    
    <!-- Subtitle -->
    <text x="600" y="350" font-size="20" text-anchor="middle" fill="#fff" font-family="Arial">A Collection of Hindu Devotional Hymns</text>
</svg> 